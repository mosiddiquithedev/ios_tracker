name: macOS App Discovery Crawler

on:
  schedule:
    # Runs every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  crawl:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4]
      fail-fast: false # let other chunks finish even if one fails

    concurrency:
      group: scraper-mac-${{ matrix.chunk }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./crawler
        run: npm ci || npm install

      - name: Run macOS Crawler (chunk ${{ matrix.chunk }})
        working-directory: ./crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHUNK_INDEX: ${{ matrix.chunk }}
          CHUNK_TOTAL: 5
        run: node index-mac.js
