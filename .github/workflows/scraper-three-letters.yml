name: Three-Letter App Discovery Crawler

on:
  schedule:
    # Runs every 3 hours: 01:00, 04:00, 07:00, 10:00, 13:00, 16:00, 19:00, 22:00 UTC
    # Offset from the main crawler (runs on :00) to avoid overlap
    # Runtime: ~88 min (17,576 queries × 300ms), well within the 3-hour window
    - cron: '0 1/3 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  crawl-three-letters:
    runs-on: ubuntu-latest

    # Ensure this crawler doesn't run concurrently with itself or the main crawler
    concurrency:
      group: scraper
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./crawler
        run: npm ci || npm install

      - name: Run Three-Letter Crawler
        working-directory: ./crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node index.js --three-letters
