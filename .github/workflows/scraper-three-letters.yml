name: Three-Letter App Discovery Crawler

on:
  schedule:
    # Runs every 4 hours: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00 UTC
    # Offset by 2h from the main crawler (runs on :00) to avoid overlap
    # Runtime: ~3-5 min (17,576 queries / 10 concurrent requests at 100ms delay)
    - cron: '0 2/4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  crawl-three-letters:
    runs-on: ubuntu-latest

    # Ensure this crawler doesn't run concurrently with itself or the main crawler
    concurrency:
      group: scraper
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./crawler
        run: npm ci || npm install

      - name: Run Three-Letter Crawler
        working-directory: ./crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node index.js --three-letters
