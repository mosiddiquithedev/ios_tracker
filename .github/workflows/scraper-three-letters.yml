name: Three-Letter App Discovery Crawler

on:
  schedule:
    # Runs every 4 hours: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00 UTC
    # Offset by 2h from the main crawler (runs on :00) to avoid overlap
    # Runtime: ~60-90 min (4 parallel runners, each doing ~4,400 queries at 4 concurrent × 3000ms)
    - cron: '0 2/4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  crawl-three-letters:
    runs-on: ubuntu-latest

    strategy:
      # Run all 4 matrix jobs in parallel (each uses a different runner IP)
      fail-fast: false
      matrix:
        range:
          - { start: 'a', end: 'f', label: 'a-f' }
          - { start: 'g', end: 'l', label: 'g-l' }
          - { start: 'm', end: 'r', label: 'm-r' }
          - { start: 's', end: 'z', label: 's-z' }

    name: Crawl (${{ matrix.range.label }})

    # Prevent individual matrix jobs from overlapping on re-runs
    concurrency:
      group: scraper-three-${{ matrix.range.label }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./crawler
        run: npm ci || npm install

      - name: Run Three-Letter Crawler (${{ matrix.range.label }})
        working-directory: ./crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node index.js --three-letters --range=${{ matrix.range.start }}-${{ matrix.range.end }}
